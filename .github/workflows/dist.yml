name: Distributions (RPM / Windows / macOS)

# Paquets natifs du module, attachés à la Release GitHub sur tag v*.
# Complète build.yml (qui produit le .deb).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history: build id needs the commit count
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: sudo apt-get update && sudo apt-get install -y rpm
      - run: cd frontend && npm ci && npm run build
        if: hashFiles('frontend/package.json') != ''
      - run: bash build_rpm.sh
        env: { SQLX_OFFLINE: "true" }
      - uses: actions/upload-artifact@v4
        with: { name: rpm, path: dist/*.rpm }
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with: { files: dist/*.rpm }

  windows:
    runs-on: windows-latest
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history: build id needs the commit count
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: choco install nsis -y --no-progress
      - run: echo "C:/Program Files (x86)/NSIS" >> "$GITHUB_PATH"
      - run: if [ -f frontend/package.json ]; then cd frontend && npm ci && npm run build; fi
      - run: bash build_windows.sh
        env: { SQLX_OFFLINE: "true" }
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/*.exe }
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with: { files: dist/*.exe }

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history: build id needs the commit count
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: if [ -f frontend/package.json ]; then cd frontend && npm ci && npm run build; fi
      - run: bash build_macos.sh
        env: { SQLX_OFFLINE: "true" }
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/*.pkg }
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with: { files: dist/*.pkg }
